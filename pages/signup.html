<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SocietyConnect</title>

    <link rel="stylesheet" href="../assets/css/signup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="signup-container">

    <div class="left-panel">

        <h1>SocietyConnect</h1>

        <p>
            Join your residential community and stay connected with
            notices, complaints, visitors and marketplace services.
        </p>

    </div>

    <div class="right-panel">

        <form class="signup-form">

            <h2>Create Account</h2>

            <input type="text" placeholder="Full Name" required>

            <input type="email" placeholder="Email Address" required>

            <input type="tel" placeholder="Phone Number" required>

            <input type="text" placeholder="Building Name" required>

            <input type="text" placeholder="Flat Number" required>

            <div class="password-box">

                <input
                    type="password"
                    id="signupPassword"
                    placeholder="Password"
                    required
                >

                <span id="toggleSignupPassword">👁️</span>

            </div>

            <div class="password-box">

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required
                >

                <span id="toggleConfirmPassword">👁️</span>

            </div>

            <button type="submit">Create Account</button>

            <p>
                Already have an account?
                <a href="login.html">Login</a>
            </p>

        </form>

    </div>

</div>

<script src="../script.js"></script>

</body>
</html>
